# device.yaml
# 设备配置文件

# ==================== ESP32 连接配置 ====================
esp32:
  # ESP32 的 IP 地址（上传固件后在串口监视器里查看）
  host: "192.168.43.36"
  ws_port: 81
  # 完整地址（自动组合，也可直接指定）
  # ws_url: "ws://192.168.43.36:81"

  connect_timeout: 5.0      # 连接超时（秒）
  response_timeout: 3.0     # 等待响应超时（秒）

# ==================== 上位机 App 接口配置 ====================
app_server:
  host: "0.0.0.0"           # 监听所有网卡（局域网可访问）
  ws_port: 8765             # App 连接此端口

# ==================== 日志配置 ====================
logging:
  level: "INFO"             # DEBUG / INFO / WARNING / ERROR
  file: "logs/robot.log"    # 日志文件路径
  max_bytes: 5242880        # 单个日志文件大小上限 5MB
  backup_count: 3           # 保留最近 3 个日志文件

# ==================== 底盘参数 ====================
chassis:
  default_speed: 0.5        # 默认速度（0.0~1.0）
  max_speed: 0.8            # 上位机侧速度上限（ESP32 侧也有限制）
  heartbeat_interval: 0.5   # 摇杆心跳发送间隔（秒）
